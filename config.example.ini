# YashanDB Performance Monitor Configuration

# Connection mode: local or ssh
connection_mode = ssh

# Path to yasql executable
yasql_path = yasql

# Connection string (e.g., "/ as sysdba" or "sys/password@ip:port as sysdba")
connect_string = / as sysdba

# SSH settings (required when connection_mode = ssh)
ssh_host = 10.10.10.130
ssh_port = 22
ssh_user = yashan
ssh_password = oracle
# ssh_key_file = /path/to/private/key

# Source command to run before yasql (optional)
# source_cmd = source /home/yashan/.bashrc

# Refresh interval in seconds
interval = 1

# Number of iterations (0 = infinite)
count = 0

# Output file path (optional)
# output_file = /tmp/ytop.log

# Number of sessions to show in TOP N
session_top_n = 10

# Session sort column (default: DB TIME)
session_sort_by = DB TIME

# Number of active sessions to show
session_detail_top_n = 10

# System statistics metrics to monitor (comma-separated)
sysstat_metrics = DB TIME,CPU TIME,COMMITS,REDO SIZE,QUERY COUNT,BLOCK CHANGES,LOGONS TOTAL,INSERT COUNT,PARSE COUNT (HARD),DISK READS,DISK WRITES,BUFFER GETS,EXECUTE COUNT,BUFFER CR GETS

# Number of top wait events to show
event_top_n = 5
